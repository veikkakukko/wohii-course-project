<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wohii Quiz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Nunito", sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: #e0e0e0;
      min-height: 100vh;
    }

    /* Header */
    header {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 {
      font-size: 1.6rem;
      font-weight: 800;
      background: linear-gradient(90deg, #f7971e, #ffd200);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 1px;
    }

    #logout-btn {
      background: transparent;
      color: #ff6b6b;
      border: 1px solid #ff6b6b;
      padding: 0.5rem 1.2rem;
      border-radius: 20px;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 700;
      display: none;
      transition: all 0.2s;
    }

    #logout-btn:hover {
      background: #ff6b6b;
      color: #fff;
      box-shadow: 0 0 15px rgba(255, 107, 107, 0.4);
    }

    main {
      max-width: 760px;
      margin: 2rem auto;
      padding: 0 1rem;
    }

    /* Auth */
    #auth-section {
      background: rgba(255, 255, 255, 0.07);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 2.5rem;
      border-radius: 16px;
      max-width: 420px;
      margin: 4rem auto;
    }

    #auth-section h2 {
      margin-bottom: 1.5rem;
      text-align: center;
      font-size: 1.5rem;
      font-weight: 800;
      color: #ffd200;
    }

    .form-group {
      margin-bottom: 1rem;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.3rem;
      font-weight: 700;
      font-size: 0.85rem;
      color: #bbb;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 0.7rem 1rem;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 10px;
      font-size: 1rem;
      font-family: inherit;
      color: #fff;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .form-group input:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: #ffd200;
      box-shadow: 0 0 0 3px rgba(255, 210, 0, 0.15);
    }

    .form-group textarea {
      resize: vertical;
    }

    #auth-section button[type="submit"] {
      width: 100%;
      padding: 0.8rem;
      background: linear-gradient(135deg, #f7971e, #ffd200);
      color: #1a1a2e;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-family: inherit;
      font-weight: 800;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: transform 0.15s, box-shadow 0.2s;
    }

    #auth-section button[type="submit"]:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 20px rgba(255, 210, 0, 0.35);
    }

    .switch-text {
      text-align: center;
      margin-top: 1.2rem;
      font-size: 0.9rem;
      color: #999;
    }

    .switch-text a {
      color: #ffd200;
      text-decoration: none;
      font-weight: 700;
    }

    .error {
      color: #ff6b6b;
      text-align: center;
      margin-top: 0.5rem;
      font-size: 0.9rem;
      font-weight: 600;
    }

    /* Question cards */
    .question-card {
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      padding: 1.5rem;
      border-radius: 14px;
      margin-bottom: 1rem;
      transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
      position: relative;
    }

    .question-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
      border-color: rgba(255, 210, 0, 0.25);
    }

    .question-card.solved-card {
      border-left: 4px solid #51cf66;
    }

    .question-image {
      display: block;
      max-width: 100%;
      border-radius: 8px;
      margin-bottom: 1rem;
    }

    .question-thumb {
      display: block;
      max-width: 100%;
      max-height: 180px;
      object-fit: cover;
      border-radius: 8px;
      margin: 0.5rem 0;
    }

    .question-card h3 {
      margin-bottom: 0.5rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .question-link {
      color: #fff;
      text-decoration: none;
      transition: color 0.2s;
    }

    .question-link:hover {
      color: #ffd200;
    }

    .read-more {
      display: inline-block;
      color: #a78bfa;
      text-decoration: none;
      font-weight: 700;
      font-size: 0.85rem;
      transition: color 0.2s;
    }

    .read-more:hover {
      color: #c4b5fd;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 1rem;
      color: #a78bfa;
      text-decoration: none;
      font-weight: 700;
      transition: color 0.2s;
    }

    .back-link:hover {
      color: #c4b5fd;
    }

    .question-meta {
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 0.8rem;
    }

    .question-answer {
      line-height: 1.7;
      color: #ccc;
      font-size: 1rem;
    }

    .question-keywords {
      margin-top: 0.8rem;
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
    }

    .keyword {
      background: rgba(167, 139, 250, 0.2);
      color: #c4b5fd;
      padding: 0.2rem 0.7rem;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.3px;
      border: 1px solid rgba(167, 139, 250, 0.25);
    }

    /* Solved badge */
    .badge-solved {
      background: linear-gradient(135deg, #51cf66, #40c057);
      color: #fff;
      padding: 0.2rem 0.7rem;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      box-shadow: 0 0 12px rgba(81, 207, 102, 0.3);
      animation: badge-glow 2s ease-in-out infinite alternate;
    }

    @keyframes badge-glow {
      from { box-shadow: 0 0 8px rgba(81, 207, 102, 0.2); }
      to   { box-shadow: 0 0 18px rgba(81, 207, 102, 0.45); }
    }

    /* Pagination */
    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 1rem;
      margin-top: 1.5rem;
    }

    .page-info {
      font-size: 0.85rem;
      color: #888;
      font-weight: 600;
    }

    .btn-page {
      background: rgba(167, 139, 250, 0.2);
      color: #c4b5fd;
      border: 1px solid rgba(167, 139, 250, 0.3);
    }

    .btn-page:hover:not(:disabled) {
      background: rgba(167, 139, 250, 0.35);
      box-shadow: 0 0 12px rgba(167, 139, 250, 0.25);
    }

    .btn-page:disabled {
      background: rgba(255, 255, 255, 0.04);
      color: #555;
      border-color: rgba(255, 255, 255, 0.06);
      cursor: not-allowed;
    }

    /* Toolbar & search */
    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .toolbar .btn-primary {
      margin-bottom: 0;
    }

    .search-bar {
      display: flex;
      gap: 0.4rem;
      align-items: center;
    }

    .search-bar input {
      padding: 0.55rem 1rem;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 10px;
      font-size: 0.85rem;
      font-family: inherit;
      color: #fff;
      width: 200px;
      transition: border-color 0.2s;
    }

    .search-bar input:focus {
      outline: none;
      border-color: #ffd200;
    }

    .search-bar input::placeholder {
      color: #666;
    }

    .btn-search {
      background: rgba(167, 139, 250, 0.2);
      color: #c4b5fd;
      border: 1px solid rgba(167, 139, 250, 0.25);
    }

    .btn-search:hover {
      background: rgba(167, 139, 250, 0.35);
    }

    .btn-clear {
      background: rgba(255, 255, 255, 0.06);
      color: #999;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .btn-clear:hover {
      background: rgba(255, 255, 255, 0.12);
      color: #ccc;
    }

    /* Buttons */
    .btn {
      padding: 0.45rem 1rem;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 700;
      font-family: inherit;
      transition: all 0.2s;
    }

    .btn-primary {
      background: linear-gradient(135deg, #f7971e, #ffd200);
      color: #1a1a2e;
      padding: 0.65rem 1.4rem;
      font-size: 0.9rem;
      font-weight: 800;
      border-radius: 12px;
      margin-bottom: 1.2rem;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 18px rgba(255, 210, 0, 0.3);
    }

    .btn-edit {
      background: rgba(167, 139, 250, 0.15);
      color: #c4b5fd;
      border: 1px solid rgba(167, 139, 250, 0.25);
    }

    .btn-edit:hover {
      background: rgba(167, 139, 250, 0.3);
    }

    .btn-delete {
      background: rgba(255, 107, 107, 0.12);
      color: #ff6b6b;
      border: 1px solid rgba(255, 107, 107, 0.2);
    }

    .btn-delete:hover {
      background: rgba(255, 107, 107, 0.25);
    }

    /* Play button */
    .btn-play {
      background: linear-gradient(135deg, #51cf66, #40c057);
      color: #fff;
      font-weight: 800;
      padding: 0.5rem 1.2rem;
      font-size: 0.85rem;
      border-radius: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .btn-play:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 18px rgba(81, 207, 102, 0.35);
    }

    /* Question actions row */
    .question-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 1rem;
    }

    .question-actions > span {
      display: flex;
      gap: 0.6rem;
      align-items: center;
    }

    .detail-actions {
      justify-content: flex-end;
      gap: 0.5rem;
    }

    .owner-actions {
      display: flex;
      gap: 0.5rem;
    }

    /* Question form / Play form wrapper */
    .question-form-wrapper {
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      padding: 2rem;
      border-radius: 16px;
    }

    .question-form-wrapper h2 {
      margin-bottom: 1.5rem;
      font-weight: 800;
      color: #ffd200;
    }

    .question-form-wrapper h3 {
      font-size: 1.3rem;
      font-weight: 800;
      color: #fff;
      margin-bottom: 0.5rem;
    }

    .question-form-wrapper button[type="submit"] {
      margin-top: 0.5rem;
    }

    /* Play screen */
    .play-question-text {
      font-size: 1.4rem;
      font-weight: 800;
      color: #fff;
      text-align: center;
      padding: 1.5rem 0;
      line-height: 1.4;
    }

    .play-result {
      margin-top: 1.2rem;
      padding: 1.2rem 1.5rem;
      border-radius: 14px;
      font-weight: 800;
      font-size: 1.1rem;
      text-align: center;
      animation: result-pop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes result-pop {
      from { transform: scale(0.8); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }

    .play-result.correct {
      background: rgba(81, 207, 102, 0.15);
      color: #51cf66;
      border: 1px solid rgba(81, 207, 102, 0.3);
      box-shadow: 0 0 30px rgba(81, 207, 102, 0.15);
    }

    .play-result.incorrect {
      background: rgba(255, 107, 107, 0.12);
      color: #ff6b6b;
      border: 1px solid rgba(255, 107, 107, 0.25);
    }

    .play-result.incorrect strong {
      color: #ffd200;
    }

    /* Score bar */
    .score-bar {
      display: flex;
      justify-content: center;
      gap: 2rem;
      margin-bottom: 1.5rem;
      padding: 0.8rem 1.5rem;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .score-item {
      text-align: center;
    }

    .score-value {
      font-size: 1.6rem;
      font-weight: 800;
      color: #ffd200;
    }

    .score-label {
      font-size: 0.7rem;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 700;
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: #666;
      font-size: 1.1rem;
    }

    /* Loading */
    .loading {
      text-align: center;
      padding: 2rem;
      color: #888;
    }
  </style>
</head>
<body>
  <header>
    <h1>WOHII QUIZ</h1>
    <button id="logout-btn">Log out</button>
  </header>

  <main>
    <section id="auth-section" style="display: none"></section>

    <section id="app-section" style="display: none">
      <div id="questions-container"></div>
    </section>
  </main>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
